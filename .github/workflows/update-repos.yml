name: Update GitHub repos cache

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GitHub repositories
        env:
          GH_USER: jvcataquiz
        run: |
          curl -L -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/$GH_USER/repos?per_page=100" -o data/repos.json

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          git diff --cached --quiet || git commit -m "Update GitHub repos cache"
          git push
